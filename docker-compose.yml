services:
  engine:
    image: openher-engine:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8800:8800"
    volumes:
      # Core assets (persist across container updates — never lose personality)
      - ./.data:/app/.data
      # Persona definitions (volume mount supports hot reload)
      - ./persona/personas:/app/persona/personas
      # LLM configuration (read-only)
      - ./providers/api.yaml:/app/providers/api.yaml:ro
    env_file: .env
    environment:
      ENGINE_TICK_INTERVAL: "300"        # Proactive sweep interval (seconds)
      ENGINE_SESSION_POOL_MAX: "100"     # In-memory session pool limit (LRU eviction)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/api/engine/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G   # SQLite + NN matrices in-memory, 1G is sufficient
