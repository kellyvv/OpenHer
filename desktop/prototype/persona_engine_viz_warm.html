<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Persona Engine — Neural Network Visualization</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── OpenHer color tokens ── */
:root {
  --bg:         #f0e6d3;
  --bg-canvas:  #ede0ca;
  --bg-sidebar: #e8d9c4;
  --border:     rgba(139,94,60,0.12);
  --text-1:     #3d2318;
  --text-2:     rgba(61,35,24,0.55);
  --text-3:     rgba(61,35,24,0.35);
  --accent:     #c8705a;     /* OpenHer coral */
  --gold:       #b8892a;     /* brass/gold */
  --bar-bg:     rgba(139,94,60,0.10);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* ── Layout ── */
.container {
  display: flex;
  height: 100vh;
}
.panel-network {
  flex: 1;
  position: relative;
  background: linear-gradient(150deg, #f5ead4 0%, #ede0c8 45%, #e8d5be 100%);
}
.panel-sidebar {
  width: 284px;
  background: var(--bg-sidebar);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 22px 18px;
  gap: 16px;
  overflow-y: auto;
}

/* ── Canvas ── */
#networkCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Header overlay ── */
.header-overlay {
  position: absolute;
  top: 22px;
  left: 26px;
  z-index: 10;
}
.header-overlay h1 {
  font-size: 10px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.header-overlay .persona-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--accent);
  margin-top: 3px;
  letter-spacing: 0.3px;
}
.header-overlay .meta {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Status indicator ── */
.status-dot {
  position: absolute;
  top: 26px;
  right: 304px;
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}
.status-dot .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #8faa6a;
  box-shadow: 0 0 7px rgba(143,170,106,0.5);
  animation: pulse-dot 2.4s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 0.55; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.35); }
}

/* ── Sidebar sections ── */
.section-title {
  font-size: 9px;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* Signals output */
.signal-row {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 7px;
}
.signal-label {
  width: 82px;
  color: var(--text-2);
  font-size: 11px;
  flex-shrink: 0;
}
.signal-bar-bg {
  flex: 1;
  height: 7px;
  background: var(--bar-bg);
  border-radius: 4px;
  overflow: visible;
  position: relative;
}
.signal-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.signal-val {
  width: 32px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-2);
  flex-shrink: 0;
}

/* Drives */
.drive-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 9px;
}
.drive-icon { font-size: 13px; width: 18px; flex-shrink: 0; }
.drive-name {
  width: 56px;
  font-size: 11px;
  color: var(--text-2);
  flex-shrink: 0;
}
.drive-bar-bg {
  flex: 1;
  height: 5px;
  background: var(--bar-bg);
  border-radius: 3px;
  overflow: visible;
  position: relative;
}
.drive-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.drive-baseline {
  position: absolute;
  top: -2px;
  width: 1px;
  height: 9px;
  background: rgba(61,35,24,0.28);
}
.drive-val {
  width: 28px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  flex-shrink: 0;
}

/* Monologue */
.monologue-box {
  background: rgba(200,112,90,0.06);
  border: 1px solid rgba(200,112,90,0.18);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 13px;
  font-style: italic;
  color: rgba(61,35,24,0.70);
  line-height: 1.7;
  min-height: 64px;
}

/* Style recall */
.recall-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.recall-text { color: var(--text-2); }
.recall-dist {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
}

/* Frustration meter */
.frustration-track {
  height: 5px;
  background: var(--bar-bg);
  border-radius: 3px;
  overflow: visible;
}
.frustration-bar {
  height: 100%;
  background: linear-gradient(90deg, #c8a030, #c8705a, #b84040);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.frustration-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-3);
  margin-top: 5px;
  font-family: 'JetBrains Mono', monospace;
}

/* Trigger button — 唤醒 style */
.trigger-btn {
  position: absolute;
  bottom: 24px;
  left: 24px;
  z-index: 10;
  background: var(--accent);
  border: none;
  color: #fff8f2;
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 14px;
  font-weight: 500;
  padding: 11px 28px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.22s;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 18px rgba(200,112,90,0.28);
}
.trigger-btn:hover {
  background: #b86048;
  box-shadow: 0 6px 24px rgba(200,112,90,0.38);
  transform: translateY(-1px);
}
.trigger-btn:active { transform: scale(0.97) translateY(0); }

.turn-counter {
  position: absolute;
  bottom: 30px;
  left: 196px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
}
</style>
</head>
<body>

<div class="container">
  <div class="panel-network">
    <div class="header-overlay">
      <h1>Persona Engine</h1>
      <div class="persona-name">Iris · INFP</div>
      <div class="meta">seed: 42 · age: 127 · hidden: 24 neurons</div>
    </div>
    <div class="status-dot">
      <span class="dot"></span>
      <span id="statusText">IDLE</span>
    </div>
    <canvas id="networkCanvas"></canvas>
    <button class="trigger-btn" onclick="triggerCompute()">⚡ Compute Step</button>
    <div class="turn-counter">Turn #<span id="turnCount">0</span></div>
  </div>

  <div class="panel-sidebar">
    <div>
      <div class="section-title">Behavioral Signals</div>
      <div id="signalBars"></div>
    </div>
    <div>
      <div class="section-title">Inner Drives</div>
      <div id="driveBars"></div>
    </div>
    <div>
      <div class="section-title">Frustration → Noise</div>
      <div class="frustration-track">
        <div class="frustration-bar" id="frustrationBar" style="width: 0%"></div>
      </div>
      <div class="frustration-label">
        <span>0.0</span>
        <span id="frustrationVal">0.00</span>
        <span>⚡ 2.0</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <span style="font-size:10px;color:rgba(224,220,212,0.28);font-family:'JetBrains Mono',monospace;width:44px;flex-shrink:0">temp σ</span>
        <div style="flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:3px;">
          <div id="tempBar" style="height:100%;border-radius:3px;background:linear-gradient(90deg,#60a5fa,#a78bfa,#ef4444);transition:width 0.5s ease;width:0%"></div>
        </div>
        <span id="tempVal" style="font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(224,220,212,0.45);width:32px;text-align:right">0.00</span>
      </div>
    </div>
    <div>
      <div class="section-title">Feel · 内心独白</div>
      <div class="monologue-box" id="monologue">等待计算...</div>
    </div>
    <div>
      <div class="section-title">Style Memory Recall</div>
      <div id="recallList"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// Neural Network Simulation
// ══════════════════════════════════════════════

const DRIVES = ['connection', 'novelty', 'expression', 'safety', 'play'];
const DRIVE_ICONS = ['🔗', '✨', '💬', '🛡️', '🎭'];
const SIGNALS = ['directness', 'vulnerability', 'playfulness', 'initiative', 'depth', 'warmth', 'defiance', 'curiosity'];
// Warm signal palette — OpenHer style (muted, organic, not neon)
const SIGNAL_COLORS = ['#6b9ec0', '#9b80cc', '#cc6b88', '#5a9e78', '#5aaac0', '#c8864a', '#c05858', '#c8a030'];
const CONTEXT_FEATURES = [
  'user_emotion', 'topic_intimacy', 'time_of_day', 'conversation_depth',
  'user_engagement', 'conflict_level', 'novelty_level', 'user_vulnerability',
  'relationship_depth', 'emotional_valence', 'trust_level', 'pending_foresight'
];

const N_DRIVES = 5, N_PERCEPTION = 8, N_RELATIONSHIP = 4, N_CONTEXT = 12, RECURRENT_SIZE = 8;
const INPUT_SIZE = N_DRIVES + N_CONTEXT + RECURRENT_SIZE; // 25

// Signal semantics from the actual engine (low → high)
const SIGNAL_SEMANTICS = [
  ['委婉', '直说'],
  ['防御', '袒露'],
  ['认真', '玩闹'],
  ['被动', '主动'],
  ['闲聊', '深度'],
  ['冷淡', '热情'],
  ['顺从', '反抗'],
  ['无所谓', '追问'],
];
const HIDDEN_SIZE = 24;
const N_SIGNALS = 8;

class Agent {
  constructor(seed) {
    this.rng = this.seededRandom(seed);
    this.driveState = {};
    this.driveBaseline = {};
    DRIVES.forEach(d => {
      this.driveBaseline[d] = this.rng() * 0.6 + 0.2;
      this.driveState[d] = this.driveBaseline[d];
    });
    this.W1 = Array.from({length: HIDDEN_SIZE}, () =>
      Array.from({length: INPUT_SIZE}, () => this.rng() * 1.2 - 0.6));
    this.b1 = Array.from({length: HIDDEN_SIZE}, () => this.rng() * 0.6 - 0.3);
    this.W2 = Array.from({length: N_SIGNALS}, () =>
      Array.from({length: HIDDEN_SIZE}, () => this.rng() * 0.4 - 0.2));
    this.b2 = Array.from({length: N_SIGNALS}, () => this.rng() * 0.4 - 0.2);
    this.recurrentState = Array.from({length: RECURRENT_SIZE}, () => this.rng() * 0.2 - 0.1);
    this.frustration = 0;
    this.age = 0;
    this.lastHidden = new Array(HIDDEN_SIZE).fill(0);
    this.lastInput = new Array(INPUT_SIZE).fill(0);
    this.lastSignals = {};
    SIGNALS.forEach(s => this.lastSignals[s] = 0.5);
  }

  seededRandom(seed) {
    let s = seed;
    return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
  }

  computeSignals(context) {
    const driveVec = DRIVES.map(d => this.driveState[d]);
    const ctxVec = CONTEXT_FEATURES.map(f => context[f] || 0);
    const fullInput = [...driveVec, ...ctxVec, ...this.recurrentState];
    const noisyInput = fullInput.map(v => v + (Math.random() - 0.5) * 0.06);
    this.lastInput = [...noisyInput];
    const hidden = [];
    for (let i = 0; i < HIDDEN_SIZE; i++) {
      let z = this.b1[i];
      for (let j = 0; j < INPUT_SIZE; j++) z += this.W1[i][j] * noisyInput[j];
      hidden.push(Math.tanh(z));
    }
    this.recurrentState = hidden.slice(0, RECURRENT_SIZE);
    this.lastHidden = [...hidden];
    const signals = {};
    for (let i = 0; i < N_SIGNALS; i++) {
      let z = this.b2[i];
      for (let j = 0; j < HIDDEN_SIZE; j++) z += this.W2[i][j] * hidden[j];
      z /= Math.sqrt(HIDDEN_SIZE / 3);
      signals[SIGNALS[i]] = 1 / (1 + Math.exp(-Math.max(-10, Math.min(10, z))));
    }
    this.lastSignals = signals;
    return signals;
  }

  learn(signals, reward) {
    const lr = 0.02 * (1 + Math.abs(reward));
    for (let i = 0; i < N_SIGNALS; i++) {
      const sv = signals[SIGNALS[i]];
      for (let j = 0; j < HIDDEN_SIZE; j++) {
        if (Math.abs(this.lastHidden[j]) > 0.05)
          this.W2[i][j] += lr * reward * this.lastHidden[j] * (sv - 0.5);
      }
    }
    if (reward < -0.1) this.frustration += Math.abs(reward);
    else this.frustration = Math.max(0, this.frustration - reward * 0.5);
    let phased = false;
    if (this.frustration > 2.0) {
      for (let i = 0; i < N_SIGNALS; i++) {
        this.b2[i] += -0.3 * (signals[SIGNALS[i]] - 0.5) + (Math.random() - 0.5) * 0.3;
      }
      this.frustration = 0;
      phased = true;
    }
    for (let i = 0; i < N_SIGNALS; i++)
      for (let j = 0; j < HIDDEN_SIZE; j++) {
        this.W2[i][j] *= 0.995;
        this.W2[i][j] = Math.max(-1.5, Math.min(1.5, this.W2[i][j]));
      }
    return phased;
  }

  tickDrives() {
    DRIVES.forEach(d => {
      this.driveState[d] = Math.min(1, this.driveState[d] + (Math.random() * 0.03 + 0.01));
    });
  }

  step(context, reward) {
    const signals = this.computeSignals(context);
    const phased = this.learn(signals, reward);
    this.tickDrives();
    this.age++;
    return { signals, phased };
  }
}

// ══════════════════════════════════════════════
// Visualization Engine
// ══════════════════════════════════════════════

const canvas = document.getElementById('networkCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const agent = new Agent(42);
let turnCount = 0;

// ── Utils ──
function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - 2*(1-t)*(1-t); }
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3), 16), parseInt(hex.slice(3,5), 16), parseInt(hex.slice(5,7), 16)];
}
function bezierPt(t, x1, y1, cp1x, cp1y, cp2x, cp2y, x2, y2) {
  const m = 1 - t;
  return {
    x: m*m*m*x1 + 3*m*m*t*cp1x + 3*m*t*t*cp2x + t*t*t*x2,
    y: m*m*m*y1 + 3*m*m*t*cp1y + 3*m*t*t*cp2y + t*t*t*y2,
  };
}

// ── Animation state ──
let animPulse = 0;         // 0→1 during forward pass
let computeActive = false;
let hiddenRank = new Array(HIDDEN_SIZE).fill(0); // rank[i] = activation order of neuron i
let phaseFlashT = 0;
let lastTimestamp = null;

// Particles
let idleParticles = [];    // background drift in idle
let fwdParticles = [];     // vivid particles during compute
const MAX_IDLE_P = 22;

// ── Node positions ──
const MARGIN_L = 120;

function getNodePositions() {
  const lx = [MARGIN_L, W * 0.42, W - 80 - 280];
  const nodes = { input: [], hidden: [], output: [] };

  const inputSpacing = (H - 160) / (INPUT_SIZE + 2);
  let idx = 0;
  [
    { n: N_DRIVES,       color: '#c9863c', group: 'drives' },       // amber/gold
    { n: N_PERCEPTION,   color: '#b87878', group: 'perception' },   // warm rose
    { n: N_RELATIONSHIP, color: '#7aaa88', group: 'relationship' }, // warm sage
    { n: RECURRENT_SIZE, color: '#9b80b8', group: 'recurrent' },   // warm lavender
  ].forEach(g => {
    for (let i = 0; i < g.n; i++) {
      nodes.input.push({ x: lx[0], y: 90 + idx * inputSpacing, color: g.color, group: g.group });
      idx++;
    }
  });

  const hiddenSpacing = (H - 160) / (HIDDEN_SIZE + 1);
  for (let i = 0; i < HIDDEN_SIZE; i++)
    nodes.hidden.push({ x: lx[1], y: 80 + i * hiddenSpacing, color: '#8b7050' }); // warm brown

  const outputSpacing = (H - 200) / (N_SIGNALS + 1);
  for (let i = 0; i < N_SIGNALS; i++)
    nodes.output.push({ x: lx[2], y: 120 + i * outputSpacing, color: SIGNAL_COLORS[i] });

  return nodes;
}

// ── Batch connection draw ──
// Draws ALL connections between two layers in 2 draw calls (pos + neg)
function drawLayerConnections(fromNodes, toNodes, weights, alpha) {
  if (alpha <= 0.002) return;
  ctx.lineWidth = 0.4;

  // Positive weights — warm coral
  ctx.beginPath();
  for (let i = 0; i < toNodes.length; i++) {
    for (let j = 0; j < fromNodes.length; j++) {
      if (weights[i][j] <= 0) continue;
      const x1 = fromNodes[j].x + 4, y1 = fromNodes[j].y;
      const x2 = toNodes[i].x - 4, y2 = toNodes[i].y;
      ctx.moveTo(x1, y1);
      ctx.bezierCurveTo(x1 + (x2-x1)*0.4, y1, x1 + (x2-x1)*0.6, y2, x2, y2);
    }
  }
  ctx.strokeStyle = `rgba(180,110,70,${alpha})`; // terracotta — positive weights
  ctx.stroke();

  // Negative weights — muted slate blue
  ctx.beginPath();
  for (let i = 0; i < toNodes.length; i++) {
    for (let j = 0; j < fromNodes.length; j++) {
      if (weights[i][j] >= 0) continue;
      const x1 = fromNodes[j].x + 4, y1 = fromNodes[j].y;
      const x2 = toNodes[i].x - 4, y2 = toNodes[i].y;
      ctx.moveTo(x1, y1);
      ctx.bezierCurveTo(x1 + (x2-x1)*0.4, y1, x1 + (x2-x1)*0.6, y2, x2, y2);
    }
  }
  ctx.strokeStyle = `rgba(100,115,140,${alpha * 0.55})`; // slate — negative weights
  ctx.stroke();
}

// ── Node draw ──
function drawNode(x, y, radius, color, activation) {
  const [r, g, b] = hexToRgb(color);
  const glow = Math.abs(activation);

  // Outer glow halo
  if (glow > 0.06) {
    const haloR = radius * 4;
    const grad = ctx.createRadialGradient(x, y, radius * 0.5, x, y, haloR);
    grad.addColorStop(0, `rgba(${r},${g},${b},${glow * 0.28})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(x, y, haloR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Core fill
  const alpha = 0.22 + glow * 0.78;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
  ctx.fill();
  ctx.strokeStyle = `rgba(${r},${g},${b},${Math.min(1, alpha + 0.22)})`;
  ctx.lineWidth = 0.9;
  ctx.stroke();
}

// ── Recurrent timestamp labels ──
// Replaces the arc: two minimal text stamps showing the temporal loop
function drawRecurrentArc(nodes, now) {
  const h0 = nodes.hidden[0];
  const h7 = nodes.hidden[RECURRENT_SIZE - 1];
  const hX = h0.x;

  const rFirst = nodes.input[N_DRIVES + N_CONTEXT];
  const rX = rFirst.x;

  const pulse = 0.28 + Math.sin(now * 1.1) * 0.08;

  ctx.save();
  ctx.font = '8px JetBrains Mono';

  // Bracket + "t+1 →" on hidden[0..7] right side
  ctx.strokeStyle = `rgba(155,128,184,${pulse * 0.50})`;
  ctx.lineWidth = 0.8;
  ctx.setLineDash([2, 3]);
  ctx.beginPath();
  ctx.moveTo(hX + 10, h0.y - 6);
  ctx.lineTo(hX + 18, h0.y - 6);
  ctx.lineTo(hX + 18, h7.y + 6);
  ctx.lineTo(hX + 10, h7.y + 6);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = `rgba(155,128,184,${pulse})`;
  ctx.fillText('t+1 →', hX + 22, (h0.y + h7.y) / 2 + 3);

  // "← t-1" on recurrent input nodes left side
  const rMidY = (rFirst.y + nodes.input[N_DRIVES + N_CONTEXT + RECURRENT_SIZE - 1].y) / 2;
  ctx.textAlign = 'right';
  ctx.fillStyle = `rgba(155,128,184,${pulse * 0.80})`;
  ctx.fillText('← t-1', rX - 6, rMidY + 3);
  ctx.textAlign = 'left';

  ctx.restore();
}

// ── Idle particles (slow drift along W1 paths) ──
function spawnIdleParticle(nodes) {
  const j = Math.floor(Math.random() * INPUT_SIZE);
  const i = Math.floor(Math.random() * HIDDEN_SIZE);
  const n1 = nodes.input[j], n2 = nodes.hidden[i];
  const x1 = n1.x + 4, y1 = n1.y, x2 = n2.x - 4, y2 = n2.y;
  idleParticles.push({
    t: 0,
    speed: 0.07 + Math.random() * 0.05,
    x1, y1,
    cp1x: x1 + (x2-x1)*0.4, cp1y: y1,
    cp2x: x1 + (x2-x1)*0.6, cp2y: y2,
    x2, y2,
    color: n1.color,
  });
}

function updateIdleParticles(nodes, dt) {
  if (idleParticles.length < MAX_IDLE_P && Math.random() < 0.05) {
    spawnIdleParticle(nodes);
  }
  idleParticles = idleParticles.filter(p => p.t < 1);
  idleParticles.forEach(p => {
    p.t = Math.min(1, p.t + dt * p.speed);
    const pos = bezierPt(p.t, p.x1, p.y1, p.cp1x, p.cp1y, p.cp2x, p.cp2y, p.x2, p.y2);
    const fade = p.t < 0.12 ? p.t / 0.12 : p.t > 0.82 ? (1 - p.t) / 0.18 : 1;
    const [r, g, b] = hexToRgb(p.color);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 1.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${fade * 0.32})`;
    ctx.fill();
  });
}

// ── Forward particles (vivid, travel along connections) ──
function spawnForwardParticles(nodes) {
  fwdParticles = [];

  // W1 particles: input → hidden
  for (let k = 0; k < 28; k++) {
    const j = Math.floor(Math.random() * INPUT_SIZE);
    const i = Math.floor(Math.random() * HIDDEN_SIZE);
    const n1 = nodes.input[j], n2 = nodes.hidden[i];
    const x1 = n1.x+4, y1 = n1.y, x2 = n2.x-4, y2 = n2.y;
    fwdParticles.push({
      t: -Math.random() * 0.6, // stagger: some start delayed
      speed: 0.55 + Math.random() * 0.35,
      x1, y1, cp1x: x1+(x2-x1)*0.4, cp1y: y1,
      cp2x: x1+(x2-x1)*0.6, cp2y: y2, x2, y2,
      color: n1.color, size: 1.8 + Math.random() * 0.8,
    });
  }

  // W2 particles: hidden → output (delayed start)
  for (let k = 0; k < 18; k++) {
    const j = Math.floor(Math.random() * HIDDEN_SIZE);
    const i = Math.floor(Math.random() * N_SIGNALS);
    const n1 = nodes.hidden[j], n2 = nodes.output[i];
    const x1 = n1.x+4, y1 = n1.y, x2 = n2.x-4, y2 = n2.y;
    // offset by -(0.5/speed) so they start when animPulse ~0.45
    fwdParticles.push({
      t: -(0.5 + Math.random() * 0.4),
      speed: 0.55 + Math.random() * 0.35,
      x1, y1, cp1x: x1+(x2-x1)*0.4, cp1y: y1,
      cp2x: x1+(x2-x1)*0.6, cp2y: y2, x2, y2,
      color: n2.color, size: 2 + Math.random() * 0.8,
    });
  }
}

function updateForwardParticles(dt) {
  fwdParticles = fwdParticles.filter(p => p.t < 1);
  fwdParticles.forEach(p => {
    p.t += dt * p.speed;
    if (p.t < 0) return; // waiting to start
    const pos = bezierPt(p.t, p.x1, p.y1, p.cp1x, p.cp1y, p.cp2x, p.cp2y, p.x2, p.y2);
    const fade = p.t < 0.08 ? p.t / 0.08 : p.t > 0.88 ? (1 - p.t) / 0.12 : 1;
    const [r, g, b] = hexToRgb(p.color);

    // Glow halo
    const hGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, p.size * 4);
    hGrad.addColorStop(0, `rgba(${r},${g},${b},${fade * 0.35})`);
    hGrad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = hGrad;
    ctx.fill();

    // Core particle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${fade * 0.85})`;
    ctx.fill();
  });
}

// ── Main render ──
function render(timestamp) {
  if (lastTimestamp === null) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
  lastTimestamp = timestamp;

  ctx.clearRect(0, 0, W, H);

  // Parchment background with warm vignette
  const bgGrad = ctx.createRadialGradient(W*0.45, H*0.48, 0, W*0.45, H*0.48, Math.max(W, H) * 0.72);
  bgGrad.addColorStop(0,   '#f5ead4');
  bgGrad.addColorStop(0.6, '#ede0c8');
  bgGrad.addColorStop(1,   '#e0cdb0');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  const nodes = getNodePositions();
  const now = timestamp / 1000;
  const hidden = agent.lastHidden;
  const input = agent.lastInput;
  const signals = agent.lastSignals;

  // Phase flash (phase transition red)
  if (phaseFlashT > 0) {
    ctx.fillStyle = `rgba(200,112,90,${phaseFlashT * 0.12})`;
    ctx.fillRect(0, 0, W, H);
    phaseFlashT = Math.max(0, phaseFlashT - dt * 0.7);
  }

  // Advance animation
  if (computeActive) {
    animPulse += dt * 0.33; // ~3 seconds for full pass
    if (animPulse >= 1) {
      animPulse = 1;
      computeActive = false;
      document.getElementById('statusText').textContent = 'IDLE';
    }
  }

  // ─── Connections ───

  // Idle breathe: very slight alpha flicker to feel "alive"
  const idlePulse = computeActive ? 0 : 0.005 + Math.sin(now * 0.5) * 0.003;
  // Base mesh — always visible, very faint (full 600 + 192 connections)
  drawLayerConnections(nodes.input, nodes.hidden, agent.W1, 0.036 + idlePulse);
  drawLayerConnections(nodes.hidden, nodes.output, agent.W2, 0.05 + idlePulse);

  // W1 pulse wave — brightens as signal surges through
  if (computeActive) {
    const w1T = clamp(animPulse / 0.52, 0, 1);
    const w1Boost = Math.sin(w1T * Math.PI) * 0.11;
    drawLayerConnections(nodes.input, nodes.hidden, agent.W1, w1Boost);

    // Sweep glow overlay: soft light that moves left→right through W1 zone
    const waveX = nodes.input[0].x + w1T * (nodes.hidden[0].x - nodes.input[0].x);
    const swG = ctx.createLinearGradient(waveX - 120, 0, waveX + 120, 0);
    swG.addColorStop(0,   'rgba(220,160,100,0)');
    swG.addColorStop(0.5, `rgba(220,160,100,${w1Boost * 0.18})`);
    swG.addColorStop(1,   'rgba(220,160,100,0)');
    ctx.fillStyle = swG;
    ctx.fillRect(nodes.input[0].x - 20, 0, nodes.hidden[0].x - nodes.input[0].x + 40, H);
  }

  // W2 pulse wave
  if (computeActive && animPulse > 0.44) {
    const w2T = clamp((animPulse - 0.44) / 0.52, 0, 1);
    const w2Boost = Math.sin(w2T * Math.PI) * 0.14;
    drawLayerConnections(nodes.hidden, nodes.output, agent.W2, w2Boost);

    const waveX2 = nodes.hidden[0].x + w2T * (nodes.output[0].x - nodes.hidden[0].x);
    const swG2 = ctx.createLinearGradient(waveX2 - 120, 0, waveX2 + 120, 0);
    swG2.addColorStop(0,   'rgba(220,160,100,0)');
    swG2.addColorStop(0.5, `rgba(220,160,100,${w2Boost * 0.18})`);
    swG2.addColorStop(1,   'rgba(220,160,100,0)');
    ctx.fillStyle = swG2;
    ctx.fillRect(nodes.hidden[0].x - 20, 0, nodes.output[0].x - nodes.hidden[0].x + 40, H);
  }

  // ─── Input nodes (flash at start of compute) ───
  const inputFlashT = computeActive ? clamp(animPulse * 8, 0, 1) : 1;
  nodes.input.forEach((n, i) => {
    const val = input[i] || 0;
    const breathe = 1 + Math.sin(now * 0.65 + i * 0.52) * 0.09;
    const activation = val * (computeActive ? easeOut(inputFlashT) : 1);
    drawNode(n.x, n.y, 5 * breathe, n.color, activation);
  });

  // Layer labels
  ctx.font = '9px JetBrains Mono';
  function rotLabel(text, x, y, color) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(-Math.PI/2);
    ctx.fillStyle = color || 'rgba(61,35,24,0.20)';
    ctx.fillText(text, 0, 0); ctx.restore();
  }
  rotLabel('DRIVES',      nodes.input[0].x - 22,                       nodes.input[2].y);
  rotLabel('PERCEPTION',  nodes.input[N_DRIVES].x - 22,                nodes.input[N_DRIVES + 3].y,       'rgba(184,120,120,0.38)');
  rotLabel('RELATIONSHIP',nodes.input[N_DRIVES + N_PERCEPTION].x - 22, nodes.input[N_DRIVES + N_PERCEPTION + 1].y, 'rgba(122,170,136,0.38)');
  rotLabel('RECURRENT',   nodes.input[N_DRIVES + N_CONTEXT].x - 22,    nodes.input[N_DRIVES + N_CONTEXT + 3].y,    'rgba(155,128,184,0.38)');

  // Source annotations
  ctx.font = '8px JetBrains Mono';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(184,120,120,0.30)';
  ctx.fillText('critic llm →', nodes.input[N_DRIVES].x - 28, nodes.input[N_DRIVES + 3].y);
  ctx.fillStyle = 'rgba(122,170,136,0.30)';
  ctx.fillText('evermemos →', nodes.input[N_DRIVES + N_PERCEPTION].x - 28, nodes.input[N_DRIVES + N_PERCEPTION + 1].y);
  ctx.textAlign = 'left';

  // ─── Hidden nodes (staggered activation) ───
  // hidden[0..7] contribute to recurrent state — tinted purple to show this
  nodes.hidden.forEach((n, i) => {
    const fireT = 0.27 + (hiddenRank[i] / HIDDEN_SIZE) * 0.23;
    const nodeT = computeActive ? clamp((animPulse - fireT) / 0.09, 0, 1) : 1;
    const activation = hidden[i] * (computeActive ? easeOut(nodeT) : 1);
    const breathe = 1 + Math.sin(now * 0.58 + i * 0.41) * 0.11;
    // Hidden[0..7]: slightly warmer/violet tint to show recurrent contribution
    const color = i < RECURRENT_SIZE ? '#9b80b0' : '#8b7050';
    drawNode(n.x, n.y, 6 * breathe, color, activation);
  });

  // Draw recurrent feedback arc (always visible, shows temporal loop)
  drawRecurrentArc(nodes, now);

  // ─── Output nodes (large, breathing, delayed activation) ───
  ctx.font = '11px Inter';
  nodes.output.forEach((n, i) => {
    const val = signals[SIGNALS[i]] || 0.5;
    const outT = computeActive ? clamp((animPulse - 0.70) / 0.24, 0, 1) : 1;
    const activation = val * (computeActive ? easeOut(outT) : 1);
    const breathe = 1 + Math.sin(now * 0.52 + i * 0.73) * 0.13;
    drawNode(n.x, n.y, 9 * breathe, n.color, activation);

    // Signal name + value
    ctx.font = '11px Inter';
    ctx.fillStyle = `rgba(61,35,24,${0.35 + val * 0.45})`;
    ctx.fillText(SIGNALS[i], n.x + 16, n.y + 2);
    ctx.font = '10px JetBrains Mono';
    ctx.fillStyle = 'rgba(61,35,24,0.45)';
    const lw = ctx.measureText(SIGNALS[i]).width;
    ctx.fillText(val.toFixed(2), n.x + 16 + lw + 6, n.y + 2);

    // Semantic label: low ↔ high
    const [lo, hi] = SIGNAL_SEMANTICS[i];
    ctx.font = '8.5px JetBrains Mono';
    const [sr, sg, sb] = hexToRgb(n.color);
    ctx.fillStyle = `rgba(${sr},${sg},${sb},${0.30 + (1-val) * 0.28})`;
    ctx.fillText(lo, n.x + 16, n.y + 13);
    ctx.fillStyle = 'rgba(61,35,24,0.15)';
    const loW = ctx.measureText(lo).width;
    ctx.fillText(' ↔ ', n.x + 16 + loW, n.y + 13);
    const sepW = ctx.measureText(' ↔ ').width;
    ctx.fillStyle = `rgba(${sr},${sg},${sb},${0.30 + val * 0.38})`;
    ctx.fillText(hi, n.x + 16 + loW + sepW, n.y + 13);
  });

  // ─── Particles ───
  if (computeActive) {
    updateForwardParticles(dt);
  } else {
    updateIdleParticles(nodes, dt);
  }

  requestAnimationFrame(render);
}

// ── Sidebar updates ──

function hexBarGradient(hex, val) {
  const [r, g, b] = hexToRgb(hex);
  return `linear-gradient(90deg, rgba(${r},${g},${b},0.65) 0%, rgba(${r},${g},${b},1) 80%, rgba(255,255,255,0.85) 100%)`;
}

function updateSidebar(signals, phased) {
  // Signals
  const container = document.getElementById('signalBars');
  container.innerHTML = '';
  SIGNALS.forEach((s, i) => {
    const val = signals[s];
    const [r, g, b] = hexToRgb(SIGNAL_COLORS[i]);
    const gradient = `linear-gradient(90deg,rgba(${r},${g},${b},0.55),rgba(${r},${g},${b},0.9))`;
    const glow = `0 0 6px rgba(${r},${g},${b},0.30)`;
    container.innerHTML += `
      <div class="signal-row">
        <span class="signal-label">${s}</span>
        <div class="signal-bar-bg">
          <div class="signal-bar" style="width:${val*100}%;background:${gradient};box-shadow:${glow}"></div>
        </div>
        <span class="signal-val">${val.toFixed(2)}</span>
      </div>`;
  });

  // Drives
  const driveContainer = document.getElementById('driveBars');
  driveContainer.innerHTML = '';
  DRIVES.forEach((d, i) => {
    const val = agent.driveState[d];
    const base = agent.driveBaseline[d];
    driveContainer.innerHTML += `
      <div class="drive-row">
        <span class="drive-icon">${DRIVE_ICONS[i]}</span>
        <span class="drive-name">${d}</span>
        <div class="drive-bar-bg">
          <div class="drive-bar" style="width:${val*100}%;background:linear-gradient(90deg,rgba(200,134,60,0.65),rgba(200,112,70,0.92));box-shadow:0 0 5px rgba(200,112,70,0.22)"></div>
          <div class="drive-baseline" style="left:${base*100}%"></div>
        </div>
        <span class="drive-val">${val.toFixed(2)}</span>
      </div>`;
  });

  // Frustration + Temperature (mirrors drive_metabolism.py formula)
  const frustPct = Math.min(1, agent.frustration / 2.0);
  document.getElementById('frustrationBar').style.width = `${frustPct * 100}%`;
  document.getElementById('frustrationVal').textContent = agent.frustration.toFixed(2);
  // temp = temp_coeff * tanh(frustration * temp_coeff / max_temp) + temp_floor
  const temp = 0.3 * Math.tanh(agent.frustration * 0.3 / 0.6) + 0.05;
  document.getElementById('tempBar').style.width = `${Math.min(1, temp / 0.35) * 100}%`;
  document.getElementById('tempVal').textContent = temp.toFixed(3);

  // Monologue
  document.getElementById('monologue').textContent = MONOLOGUES[turnCount % MONOLOGUES.length];

  // Style Recall
  const recallContainer = document.getElementById('recallList');
  const recalls = RECALL_DATA[turnCount % RECALL_DATA.length];
  recallContainer.innerHTML = recalls.map(r => `
    <div class="recall-item">
      <span class="recall-text">"${r.text}"</span>
      <span class="recall-dist">d=${r.d.toFixed(2)}</span>
    </div>`).join('');
}

// ── Trigger computation ──

function triggerCompute() {
  if (computeActive) return;

  const scenario = SCENARIOS[turnCount % SCENARIOS.length];
  const reward = Math.random() * 1.4 - 0.4;
  const { signals, phased } = agent.step(scenario, reward);

  turnCount++;
  document.getElementById('turnCount').textContent = turnCount;
  document.getElementById('statusText').textContent = 'COMPUTING';

  // Rank hidden neurons by activation magnitude (most active fires first)
  const sorted = Array.from({length: HIDDEN_SIZE}, (_, i) => i)
    .sort((a, b) => Math.abs(agent.lastHidden[b]) - Math.abs(agent.lastHidden[a]));
  sorted.forEach((neuronIdx, rank) => { hiddenRank[neuronIdx] = rank; });

  animPulse = 0;
  computeActive = true;
  idleParticles = []; // clear idle particles for the forward pass

  const nodes = getNodePositions();
  spawnForwardParticles(nodes);

  if (phased) {
    phaseFlashT = 1.2;
    document.getElementById('statusText').textContent = '⚡ PHASE TRANSITION';
  }

  updateSidebar(signals, phased);
}
